<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LaForge — U.S.S. Jarvis Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Chrome/geometry comes from lcars.js + app.js. This CSS styles only content
     INSIDE panels (canon "type spacing" exception). Dev keys: G grid, S saver, B boot. */
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #screen{width:100vw;height:100vh}

  /* cluster body text */
  .clb{padding:calc(var(--u)*0.4);font-size:calc(var(--u)*0.40);line-height:1.9;
    color:#d8c7ec;letter-spacing:.08em;text-transform:uppercase;height:100%;box-sizing:border-box}
  .clb .v{color:var(--c-orange,#ff9c00)} .clb .w{color:var(--c-salmon,#cc6666)}
  .standby{font-size:calc(var(--u)*0.55);color:var(--c-peach,#ff9966);letter-spacing:.2em}
  .bigval{font-size:calc(var(--u)*2.2);color:var(--c-orange,#ff9c00);font-weight:700;line-height:1;font-family:Antonio}

  /* mini level bars */
  .mb{display:flex;align-items:center;gap:calc(var(--u)*0.3);margin:calc(var(--u)*0.12) 0}
  .mb .k{width:calc(var(--u)*3.2);color:var(--c-lilac,#cc99cc)}
  .mb .t{flex:1;height:calc(var(--u)*0.5);background:#12141c;border-radius:2px;position:relative;overflow:hidden}
  .mb .t i{position:absolute;left:0;top:0;bottom:0;border-radius:2px;background:var(--c-canary,#f3f08b)}
  .mb .n{width:calc(var(--u)*1.8);text-align:right;color:var(--c-orange,#ff9c00)}

  /* camera thumbs + the scan sweep (each cam animates on its own tempo) */
  .cams{display:flex;gap:calc(var(--u)*0.3);height:62%;margin-bottom:calc(var(--u)*0.25)}
  .cam{flex:1;background:#0a0c12;border:1px solid #39415e;border-radius:4px;position:relative;overflow:hidden}
  .cam::after{content:attr(data-n);position:absolute;bottom:4px;left:6px;
    font-size:calc(var(--u)*0.35);color:#9999cc;letter-spacing:.15em}
  .cam .scan{position:absolute;left:0;right:0;height:2px;background:#66ccd9;opacity:.5;
    animation:scan linear infinite}
  /* live still feeds: fill the frame, keep the scan sweep on top for the vibe */
  .camimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92}
  .campop{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
  .cam:nth-child(1) .scan{animation-duration:4.2s}
  .cam:nth-child(2) .scan{animation-duration:5.7s;animation-delay:1.3s}
  .cam:nth-child(3) .scan{animation-duration:3.4s;animation-delay:2.1s}
  @keyframes scan{0%{top:-2px}100%{top:100%}}

  /* vertical transporter dimmers (LIGHTS workspace) */
  .slrow{display:flex;height:100%;gap:calc(var(--u)*0.8);padding:calc(var(--u)*0.6);
    box-sizing:border-box;justify-content:center}
  .vsl{display:flex;flex-direction:column;align-items:center;gap:calc(var(--u)*0.25);
    flex:0 1 calc(var(--u)*3);min-width:0}
  .vtrack{flex:1;width:70%;border:1px solid #444a63;border-radius:4px;position:relative;
    background:repeating-linear-gradient(to top,transparent 0,transparent 7px,#12141c 7px,#12141c 8px);
    touch-action:none;cursor:pointer}
  .vfill{position:absolute;left:3px;right:3px;bottom:3px;background:var(--c-canary,#f3f08b);opacity:.55;border-radius:2px}
  .vhandle{position:absolute;left:-3px;right:-3px;height:6px;background:var(--c-peach,#ff9966);border-radius:2px}
  .vval{font-size:calc(var(--u)*0.7);color:var(--c-orange,#ff9c00);font-family:Antonio}
  .vlab{font-size:calc(var(--u)*0.4);color:var(--c-lilac,#cc99cc);letter-spacing:.1em}

  /* boot-sequence typed announcement (first load only) */
  .boot-ov{position:absolute;top:38%;right:calc(var(--u)*1.5);z-index:60;
    text-align:right;font-family:Antonio;color:var(--c-orange,#ff9c00);
    pointer-events:none;letter-spacing:.1em;text-transform:uppercase}
  #boot-l1{font-size:calc(var(--u)*0.95);font-weight:600}
  #boot-l2{font-size:calc(var(--u)*0.95);font-weight:600;margin-top:.25em}

  /* embed "viewscreen" bezel: feeds read as sensor uplinks, not webpages */
  .feed{position:absolute;inset:calc(var(--u)*0.25);border:1px solid var(--c-peri,#9999cc);
    border-radius:4px;overflow:hidden;background:#0a0c12}
  .feed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .cesium-viewer-bottom{display:none!important}  /* hide Cesium credit strip inside the bezel */

  /* viewscreen popup — TRUE LCARS mini-frame (UI_STANDARDS §9):
     grid = [rail | main] × [title | body | bottom]; outer left corners round,
     inner corners get concave SVG webs; right side stays open (bracket) */
  #vpop{position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.72);
    display:flex;align-items:center;justify-content:center}
  .vs-frame{width:78vw;height:80vh;display:grid;position:relative;background:#000;
    grid-template-columns:calc(var(--u)*1.25) 1fr;
    grid-template-rows:calc(var(--u)*0.9) 1fr calc(var(--u)*0.5)}
  .vs-ctl{grid-area:1/1;border-top-left-radius:calc(var(--u)*1)}
  .vs-cbl{grid-area:3/1;border-bottom-left-radius:calc(var(--u)*1)}
  .vs-top{grid-area:1/2;display:flex;align-items:center;justify-content:space-between;
    padding-left:calc(var(--u)*0.5);color:#000;font-family:Antonio;
    font-size:calc(var(--u)*0.55);font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;border-radius:0 calc(var(--u)*0.45) calc(var(--u)*0.45) 0}
  .vs-close{cursor:pointer;background:var(--c-salmon,#cc6666);color:#000;height:100%;
    display:flex;align-items:center;padding:0 calc(var(--u)*0.6);font-weight:700;
    border-radius:0 calc(var(--u)*0.45) calc(var(--u)*0.45) 0}
  .vs-rail{grid-area:2/1;display:flex;flex-direction:column;gap:calc(var(--u)*0.18);
    padding-top:calc(var(--u)*0.18)}
  .vs-seg{flex:0 0 calc(var(--u)*1.6);display:flex;align-items:flex-end;
    justify-content:flex-end;padding:2px 4px;color:#000;font-family:Antonio;
    font-size:calc(var(--u)*0.32);font-weight:600}
  .vs-fill{flex:1;margin-top:calc(var(--u)*0.0)}
  .vs-bot{grid-area:3/2;margin-top:calc(var(--u)*0.18);
    border-radius:0 calc(var(--u)*0.25) calc(var(--u)*0.25) 0}
  .vs-body{grid-area:2/2;position:relative;overflow:hidden}
  .vs-body iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vs-in{position:absolute;width:calc(var(--u)*0.5);height:calc(var(--u)*0.5);
    z-index:3;pointer-events:none}
  .vs-in-t{top:0;left:0} .vs-in-b{bottom:0;left:0}

  /* alert-condition overlay: pulsing vignette, pointer-transparent.
     ~1.4s pulse — the TNG klaxon cadence, deliberately NOT synced to
     any other animation (§8: no unison loops) */
  #alert-overlay{position:fixed;inset:0;pointer-events:none;z-index:9000}
  #alert-overlay.alert-red{box-shadow:inset 0 0 calc(var(--u)*7) rgba(255,34,0,.55);
    animation:alertpulse 1.4s ease-in-out infinite}
  #alert-overlay.alert-yellow{box-shadow:inset 0 0 calc(var(--u)*6) rgba(255,204,51,.4);
    animation:alertpulse 2.2s ease-in-out infinite}
  @keyframes alertpulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* screensaver: dim to black, spinning Federation seal, small clock */
  #saver{position:fixed;inset:0;background:#000;z-index:9998;display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:calc(var(--u)*1);cursor:pointer}
  /* gif canvas has generous transparent padding — size up so the seal reads */
  #saver img{width:44vw;max-width:720px;opacity:.85;image-rendering:auto}
  #saver video{width:52vw;max-width:900px;opacity:.9}
  .saver-fb{font-family:Antonio;font-size:calc(var(--u)*1);color:var(--c-peri,#9999cc);
    letter-spacing:.3em;animation:fbspin 8s ease-in-out infinite}
  @keyframes fbspin{0%,100%{opacity:.9}50%{opacity:.3}}
  .saver-clk{font-family:Antonio;font-size:calc(var(--u)*0.7);color:var(--c-gold,#ffcc66);letter-spacing:.25em}

  /* LCARS sensor-target search: black field, orange entry text, SCAN pill */
  .lsearch{display:flex;gap:calc(var(--u)*0.3);margin:calc(var(--u)*0.4) 0;align-items:stretch}
  .lsearch input{flex:1;background:#0a0c12;border:1px solid var(--c-peri,#9999cc);
    border-radius:calc(var(--u)*0.25);color:var(--c-orange,#ff9c00);font-family:Antonio;
    font-size:calc(var(--u)*0.5);letter-spacing:.08em;padding:calc(var(--u)*0.25) calc(var(--u)*0.4);
    text-transform:uppercase;outline:none;min-width:0}
  .lsearch input::placeholder{color:var(--c-peri,#9999cc);opacity:.6}
  .lsearch .go{background:var(--c-lilac,#cc99cc);color:#000;border-radius:calc(var(--u)*0.5);
    display:flex;align-items:center;padding:0 calc(var(--u)*0.6);font-family:Antonio;
    font-size:calc(var(--u)*0.5);font-weight:600;letter-spacing:.1em;cursor:pointer}

  /* room-popup entity rows */
  .rp{overflow-y:auto}
  .rp-row{display:flex;align-items:center;gap:calc(var(--u)*0.6);
    border-bottom:1px solid #1a1e2c;padding:calc(var(--u)*0.3) 0}
  .rp-row span:first-child{flex:1}
  .rp-btn{background:var(--c-lilac,#cc99cc);color:#000;border-radius:calc(var(--u)*0.5);
    padding:calc(var(--u)*0.12) calc(var(--u)*0.5);font-weight:600;cursor:pointer;
    letter-spacing:.08em}

  /* ═══ HOLODECK consoles (simulation only) ═══ */
  /* transporter: pads + shimmer particle columns */
  .tr-room{position:absolute;inset:calc(var(--u)*0.5);display:flex;gap:calc(var(--u)*1);
    align-items:flex-end;justify-content:center;padding-bottom:calc(var(--u)*2.5)}
  .tr-pad{position:relative;width:calc(var(--u)*4);height:82%;display:flex;
    align-items:flex-end;justify-content:center}
  .tr-disc{width:100%;height:calc(var(--u)*1);border-radius:50%;border:2px solid var(--c-gold,#fc9);
    background:radial-gradient(ellipse, rgba(255,204,102,.25), transparent 70%)}
  .tr-col{position:absolute;inset:0 15% calc(var(--u)*0.5) 15%;opacity:0;border-radius:6px;
    background:repeating-linear-gradient(to bottom, rgba(160,220,255,.0) 0 2px, rgba(160,220,255,.5) 3px 4px),
      linear-gradient(to top, rgba(120,190,255,.35), rgba(200,240,255,.05));
    filter:blur(0.5px);transition:opacity .6s}
  .tr-active .tr-col{opacity:1;animation:trsparkle .5s linear infinite}
  .tr-active .tr-disc{box-shadow:0 0 calc(var(--u)*1) rgba(160,220,255,.8)}
  @keyframes trsparkle{0%{background-position:0 0,0 0}100%{background-position:0 7px,0 0}}
  .tr-status{position:absolute;bottom:calc(var(--u)*0.4);left:0;right:0;text-align:center;
    font-family:Antonio;font-size:calc(var(--u)*0.5);color:var(--c-orange,#f90);letter-spacing:.15em}

  /* warp core: the classic pulse — segments throb in sequence down the shaft */
  .wc{position:absolute;inset:calc(var(--u)*0.5);display:flex;flex-direction:column;align-items:center}
  .wc-shaft{flex:1;width:55%;display:flex;flex-direction:column;gap:calc(var(--u)*0.18)}
  .wc-seg{flex:1;border-radius:4px;background:linear-gradient(to right, #123, var(--c-peri,#89f), #123);
    animation:wcpulse 1.3s ease-in-out infinite}
  @keyframes wcpulse{0%,100%{opacity:.35;filter:brightness(.8)}50%{opacity:1;filter:brightness(1.5)}}
  .wc-dark .wc-seg{animation:none;opacity:.12;background:#223}
  .wc-label{font-family:Antonio;font-size:calc(var(--u)*0.42);color:var(--c-orange,#f90);
    letter-spacing:.12em;margin-top:calc(var(--u)*0.4);text-align:center;text-transform:uppercase}
  .wc-alarm{margin-top:calc(var(--u)*0.6);font-size:calc(var(--u)*0.5);line-height:1.8}

  /* breach: LOCAL red wash (never the house alert) + ship-lost card */
  #holo-red{position:fixed;inset:0;pointer-events:none;z-index:8900;
    box-shadow:inset 0 0 calc(var(--u)*9) rgba(255,20,0,.6);animation:alertpulse 0.9s ease-in-out infinite}
  .wc-lost{position:fixed;inset:0;z-index:9600;background:rgba(20,0,0,.92);display:flex;
    flex-direction:column;align-items:center;justify-content:center;font-family:Antonio;
    color:var(--c-salmon,#f55);font-size:calc(var(--u)*3);letter-spacing:.3em;font-weight:700}
  .wc-lost-sub{font-size:calc(var(--u)*0.6);color:#d8c7ec;letter-spacing:.15em;margin-top:1em}

  /* tactical: starfield, reticle, phaser beam, torpedo bolt */
  .tac{position:absolute;inset:calc(var(--u)*0.4);background:#020308;border-radius:4px;overflow:hidden}
  .tac-star{position:absolute;width:2px;height:2px;background:#cde;border-radius:50%}
  .tac-ret{position:absolute;left:62%;top:38%;width:calc(var(--u)*4);height:calc(var(--u)*4);
    transform:translate(-50%,-50%)}
  .tac-ring{position:absolute;inset:0;border:2px solid var(--c-salmon,#f55);border-radius:50%;
    animation:breatheSoftCss 2.6s ease-in-out infinite}
  @keyframes breatheSoftCss{0%,100%{opacity:1}50%{opacity:.45}}
  .tac-cross{position:absolute;left:50%;top:50%;width:calc(var(--u)*6);height:calc(var(--u)*6);
    transform:translate(-50%,-50%);
    background:linear-gradient(var(--c-salmon,#f55),var(--c-salmon,#f55)) center/1px 100% no-repeat,
               linear-gradient(var(--c-salmon,#f55),var(--c-salmon,#f55)) center/100% 1px no-repeat;opacity:.6}
  .tac-status{position:absolute;bottom:6px;left:10px;font-family:Antonio;
    font-size:calc(var(--u)*0.42);color:var(--c-orange,#f90);letter-spacing:.14em}
  .tac-beam{position:absolute;left:0;bottom:0;width:65%;height:3px;transform-origin:left bottom;
    transform:rotate(-24deg);background:linear-gradient(to right, rgba(255,120,60,0), var(--c-peach,#f86), #fff);
    animation:tacbeam .7s ease-out forwards}
  @keyframes tacbeam{0%{opacity:0;width:0}15%{opacity:1}80%{opacity:1;width:65%}100%{opacity:0}}
  .tac-torp{position:absolute;left:4%;bottom:8%;width:10px;height:10px;border-radius:50%;
    background:radial-gradient(#fff, var(--c-salmon,#f55) 60%, transparent);
    box-shadow:0 0 12px 4px rgba(255,80,50,.8);animation:tactorp 1.05s ease-in forwards}
  @keyframes tactorp{0%{transform:translate(0,0) scale(1)}90%{opacity:1}
    100%{transform:translate(56vw,-26vh) scale(.4);opacity:0}}

  /* transporter operations deck (three-track touch sliders, per reference gif) */
  .tc-deck{position:absolute;inset:calc(var(--u)*0.3);display:flex;gap:calc(var(--u)*0.8);
    align-items:stretch;background:#05060a;border-radius:6px;padding:calc(var(--u)*0.5)}
  .tc-cluster{width:calc(var(--u)*5);display:flex;flex-direction:column;gap:calc(var(--u)*0.3)}
  .tc-blk{flex:0 0 calc(var(--u)*1.3);border-radius:calc(var(--u)*0.65);display:flex;
    align-items:center;justify-content:center;color:#000;font-family:Antonio;
    font-size:calc(var(--u)*0.42);font-weight:700;letter-spacing:.1em;cursor:pointer}
  .tc-blink{animation:tcblink 3.1s steps(2) infinite}
  .tc-blink2{animation:tcblink 4.7s steps(2) infinite 1.2s}
  @keyframes tcblink{0%,60%{opacity:1}61%,100%{opacity:.35}}
  .tc-readout{flex:1;display:flex;align-items:flex-end;font-family:Antonio;
    font-size:calc(var(--u)*0.38);color:var(--c-orange,#f90);letter-spacing:.1em}
  .tc-tracks{flex:1;display:flex;gap:calc(var(--u)*1.2);justify-content:center}
  .tc-track{width:calc(var(--u)*2.6);position:relative;border:1px solid #39415e;
    border-radius:calc(var(--u)*0.3);touch-action:none;cursor:pointer;overflow:visible;
    background:repeating-linear-gradient(to top,transparent 0 6px,#10131d 6px 8px)}
  .tc-fill{position:absolute;left:3px;right:3px;bottom:3px;height:0;border-radius:3px;
    background:linear-gradient(to top, var(--c-gold,#fc9), #fff3c0);
    box-shadow:0 0 calc(var(--u)*0.5) rgba(255,204,102,.7)}
  .tc-grip{position:absolute;left:-4px;right:-4px;bottom:0;height:8px;border-radius:4px;
    background:var(--c-peach,#f86)}
  .tc-lock .tc-fill{background:linear-gradient(to top,#fff,#cfe8ff);
    box-shadow:0 0 calc(var(--u)*0.9) rgba(190,225,255,.9);animation:tclock .5s ease-in-out 4}
  @keyframes tclock{0%,100%{opacity:1}50%{opacity:.55}}

  /* MSD: image cutaway + percentage tap spots */
  .msd-wrap{position:absolute;inset:0}
  .msd-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  .msd-spot{position:absolute;width:calc(var(--u)*0.7);height:calc(var(--u)*0.7);
    margin:calc(var(--u)*-0.35) 0 0 calc(var(--u)*-0.35);border-radius:50%;cursor:pointer;
    background:var(--c-gold,#fc9);box-shadow:0 0 calc(var(--u)*0.4) rgba(255,204,102,.9);
    animation:spotpulse ease-in-out infinite}
  @keyframes spotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}

  /* warp core gif */
  .wc-gif{height:100%;width:100%;object-fit:contain;filter:drop-shadow(0 0 8px rgba(140,190,255,.4))}
  .wc-dark .wc-gif{filter:grayscale(1) brightness(.18)}

  /* routine-assignment rows + LCARS select */
  .rt{overflow-y:auto}
  .rt-grp{color:var(--c-peach,#f86);font-weight:700;letter-spacing:.18em;
    margin-top:calc(var(--u)*0.4);border-bottom:1px solid #39415e}
  .rt-row{display:flex;flex-direction:column;gap:2px;padding:calc(var(--u)*0.2) 0}
  .rt-sel{background:#0a0c12;color:var(--c-orange,#f90);border:1px solid var(--c-peri,#99c);
    border-radius:calc(var(--u)*0.2);font-family:Antonio;font-size:calc(var(--u)*0.38);
    letter-spacing:.06em;padding:calc(var(--u)*0.12);max-width:100%;outline:none}

  /* workspace switch buttons */
  .btncol{display:flex;flex-direction:column;gap:calc(var(--u)*0.5);padding:calc(var(--u)*0.6)}
  .wbtn{height:calc(var(--u)*1.8);border-radius:calc(var(--u)*0.9);color:#000;
    font-size:calc(var(--u)*0.55);font-weight:600;display:flex;align-items:center;
    justify-content:center;letter-spacing:.08em;font-family:Antonio}
</style>
</head>
<body>
<div id="screen"></div>
<!-- config.local.js is GITIGNORED (HA token); absent = simulated mode.
     ?v= version query = cache-bust (bump when shipping to the kiosk/Fred) -->
<script src="config.local.js" onerror="console.warn('[LaForge] no local config — simulated mode')"></script>
<script src="lcars.js?v=14"></script>
<script src="floorplan.js?v=14"></script>
<script src="ha.js?v=14"></script>
<script src="sfx.js?v=14"></script>
<script src="holodeck.js?v=14"></script>
<script src="app.js?v=14"></script>
</body>
</html>
